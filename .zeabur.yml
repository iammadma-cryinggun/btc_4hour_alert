# Zeabur部署配置文件
# V4.1.1 双信号版

version: 1

services:
  - name: btc-physics-v411
    # 服务类型：worker（长时间运行的任务）
    type: worker

    # 使用Docker运行
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile

    # 环境变量
    env:
      - name: TZ
        value: Asia/Shanghai
      - name: PYTHONUNBUFFERED
        value: "1"
      - name: TELEGRAM_TOKEN
        value: 8189663571:AAEvIUEBTfF_MfyKc7rWq5gQvgi4gAxZJrA
      - name: TELEGRAM_CHAT_ID
        value: "838429342"

    # 资源配置
    resources:
      cpu: 0.5        # 0.5核CPU
      memory: 512     # 512MB内存

    # 持久化存储
    volumes:
      - path: /app/data
        name: btc-physics-data

    # 端口（如果需要Web界面）
    # ports:
    #   - port: 8080
    #     protocol: TCP

    # 自动重启
    restart: true

    # 健康检查
    healthCheck:
      http:
        port: 80
        path: /health
        interval: 30s
        timeout: 10s
