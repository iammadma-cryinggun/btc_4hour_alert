# Zeabur部署配置文件
version: 1

services:
  - name: btc-physics-v411
    type: worker
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    env:
      - name: TZ
        value: Asia/Shanghai
      - name: PYTHONUNBUFFERED
        value: "1"
      - name: ZEABUR
        value: "1"
      - name: TELEGRAM_TOKEN
        value: YOUR_TELEGRAM_BOT_TOKEN_HERE
      - name: TELEGRAM_CHAT_ID
        value: YOUR_TELEGRAM_CHAT_ID_HERE
      - name: WECHAT_SCKEY
        value: YOUR_WECHAT_SCKEY_HERE
    resources:
      cpu: 0.5
      memory: 512
    volumes:
      - path: /app/data
        name: btc-physics-data
    restart: true
